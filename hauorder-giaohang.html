<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HauOrder — Giao Hàng</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --ocean: #0a3d62;
  --ocean-mid: #1a6fa8;
  --pearl: #f0f8ff;
  --shell: #e8f4fd;
  --foam: #ffffff;
  --ink: #0d2137;
  --ink-mid: #2c5282;
  --muted: #5a7fa0;
  --border: #c8dff0;
  --success: #00b894;
  --warning: #f39c12;
  --danger: #e17055;
  --gold: #f9ca24;
  --shipped: #9b59b6;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Be Vietnam Pro',sans-serif; background:var(--pearl); color:var(--ink); min-height:100vh; }

/* HEADER */
.header { background:linear-gradient(135deg,var(--ocean) 0%,#1e5f8a 100%); position:sticky; top:0; z-index:100; box-shadow:0 4px 20px rgba(10,61,98,0.3); }
.header-inner { max-width:1100px; margin:0 auto; padding:14px 24px; display:flex; align-items:center; gap:14px; }
.logo { width:44px; height:44px; background:var(--gold); border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:21px; flex-shrink:0; }
.header-title h1 { font-size:19px; font-weight:800; color:white; }
.header-title p { font-size:11.5px; color:rgba(255,255,255,0.65); margin-top:1px; }
.header-actions { margin-left:auto; display:flex; gap:10px; }
.btn-h { padding:8px 14px; border-radius:18px; font-size:12.5px; font-weight:600; cursor:pointer; font-family:'Be Vietnam Pro',sans-serif; transition:all 0.2s; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.1); color:white; }
.btn-h:hover { background:rgba(255,255,255,0.2); }

.tabs { background:var(--ocean); border-top:1px solid rgba(255,255,255,0.1); }
.tabs-inner { max-width:1100px; margin:0 auto; padding:0 24px; display:flex; }
.tab { padding:10px 16px; font-size:13px; font-weight:600; color:rgba(255,255,255,0.55); cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s; display:flex; align-items:center; gap:5px; }
.tab:hover { color:rgba(255,255,255,0.9); }
.tab.active { color:var(--gold); border-bottom-color:var(--gold); }

/* MAIN */
.main { max-width:1100px; margin:0 auto; padding:24px; }

/* STATS */
.stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:22px; }
.stat-card { background:var(--foam); border:1px solid var(--border); border-radius:13px; padding:16px 18px; display:flex; align-items:center; gap:13px; box-shadow:0 2px 8px rgba(10,61,98,0.07); }
.stat-icon { width:44px; height:44px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
.si-orange { background:rgba(243,156,18,0.12); }
.si-purple { background:rgba(155,89,182,0.12); }
.si-green { background:rgba(0,184,148,0.12); }
.si-red { background:rgba(225,112,85,0.12); }
.stat-num { font-size:26px; font-weight:800; color:var(--ocean); line-height:1; }
.stat-label { font-size:11.5px; color:var(--muted); margin-top:3px; }

/* FILTER BAR */
.filter-bar { background:var(--foam); border:1px solid var(--border); border-radius:13px; padding:14px 18px; margin-bottom:18px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.filter-bar select, .filter-bar input { padding:8px 12px; border:1.5px solid var(--border); border-radius:8px; font-size:13px; font-family:'Be Vietnam Pro',sans-serif; outline:none; color:var(--ink); transition:border-color 0.2s; }
.filter-bar select:focus, .filter-bar input:focus { border-color:var(--ocean-mid); }
.flabel { font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; white-space:nowrap; }
.btn-clear { padding:8px 14px; background:var(--shell); border:1px solid var(--border); border-radius:8px; font-size:12.5px; font-weight:600; cursor:pointer; color:var(--muted); font-family:'Be Vietnam Pro',sans-serif; transition:all 0.2s; }
.btn-clear:hover { border-color:var(--danger); color:var(--danger); }

/* SECTION */
.section-title { font-size:13px; font-weight:700; color:var(--ocean); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.section-title::after { content:''; flex:1; height:1px; background:var(--border); }

/* DELIVERY CARDS */
.delivery-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; margin-bottom:24px; }

.delivery-card { background:var(--foam); border:1px solid var(--border); border-radius:14px; overflow:hidden; transition:all 0.2s; box-shadow:0 2px 8px rgba(10,61,98,0.06); }
.delivery-card:hover { box-shadow:0 6px 20px rgba(10,61,98,0.12); transform:translateY(-1px); }
.delivery-card.late { border-color:rgba(225,112,85,0.4); }

.dc-top { padding:14px 16px 10px; border-bottom:1px solid var(--border); }
.dc-customer { font-size:15px; font-weight:800; color:var(--ocean); margin-bottom:4px; }
.dc-meta { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.dc-po { font-size:11px; color:var(--muted); }
.dc-ch { font-size:11px; font-weight:600; background:var(--shell); color:var(--ocean-mid); padding:2px 8px; border-radius:6px; }
.dc-late-badge { font-size:10px; font-weight:800; background:var(--danger); color:white; padding:2px 8px; border-radius:6px; }

.dc-body { padding:12px 16px; }
.dc-info-row { display:flex; align-items:flex-start; gap:8px; margin-bottom:8px; font-size:13px; }
.dc-info-row:last-child { margin-bottom:0; }
.dc-icon { font-size:15px; flex-shrink:0; margin-top:1px; }
.dc-val { color:var(--ink); line-height:1.4; }
.dc-val strong { color:var(--ocean); }
.dc-products { font-size:12px; color:var(--muted); margin-top:4px; }

.dc-footer { padding:10px 16px; background:var(--shell); display:flex; gap:8px; align-items:center; }
.btn-shipped { flex:1; padding:9px; border-radius:9px; font-size:13px; font-weight:700; cursor:pointer; border:none; font-family:'Be Vietnam Pro',sans-serif; transition:all 0.2s; background:rgba(155,89,182,0.12); color:#7d3c98; border:1px solid rgba(155,89,182,0.3); }
.btn-shipped:hover { background:rgba(155,89,182,0.22); }
.btn-delivered { flex:1; padding:9px; border-radius:9px; font-size:13px; font-weight:700; cursor:pointer; border:none; font-family:'Be Vietnam Pro',sans-serif; transition:all 0.2s; background:rgba(0,184,148,0.1); color:#00956e; border:1px solid rgba(0,184,148,0.3); }
.btn-delivered:hover { background:rgba(0,184,148,0.2); }

/* CONFIRM MODAL */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(10,61,98,0.55); z-index:1000; align-items:center; justify-content:center; padding:20px; }
.modal-overlay.open { display:flex; }
.modal { background:white; border-radius:20px; width:100%; max-width:480px; box-shadow:0 20px 60px rgba(10,61,98,0.25); overflow:hidden; }
.modal-head { padding:18px 22px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.modal-head h3 { font-size:16px; font-weight:700; color:var(--ocean); }
.modal-close { background:none; border:none; font-size:22px; cursor:pointer; color:var(--muted); line-height:1; }
.modal-body { padding:22px; }
.modal-body .info-block { background:var(--shell); border-radius:10px; padding:14px 16px; margin-bottom:16px; font-size:13.5px; }
.modal-body .info-block strong { display:block; font-size:15px; color:var(--ocean); margin-bottom:6px; }
.modal-body label { font-size:12.5px; font-weight:700; color:var(--ink-mid); display:block; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; }
.modal-body textarea { width:100%; padding:10px 12px; border:1.5px solid var(--border); border-radius:9px; font-size:13.5px; font-family:'Be Vietnam Pro',sans-serif; resize:vertical; min-height:80px; outline:none; }
.modal-body textarea:focus { border-color:var(--ocean-mid); }
.modal-actions { padding:14px 22px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; }
.btn-modal { padding:10px 20px; border-radius:10px; font-size:13.5px; font-weight:700; cursor:pointer; border:none; font-family:'Be Vietnam Pro',sans-serif; transition:all 0.2s; }
.btn-cancel-modal { background:var(--shell); color:var(--muted); border:1px solid var(--border); }
.btn-confirm-modal { background:var(--success); color:white; box-shadow:0 4px 12px rgba(0,184,148,0.3); }
.btn-confirm-modal:hover { background:#00a37e; }

/* DELIVERED LIST */
.delivered-list { display:flex; flex-direction:column; gap:10px; }
.delivered-item { background:var(--foam); border:1px solid var(--border); border-radius:11px; padding:12px 16px; display:flex; align-items:center; gap:14px; }
.di-check { font-size:22px; }
.di-info { flex:1; }
.di-customer { font-size:14px; font-weight:700; color:var(--ocean); }
.di-detail { font-size:12px; color:var(--muted); margin-top:2px; }
.di-note { font-size:12px; color:var(--success); margin-top:3px; font-style:italic; }
.di-time { font-size:11.5px; color:var(--success); font-weight:600; white-space:nowrap; text-align:right; }

.empty-state { text-align:center; padding:40px; color:var(--muted); }
.empty-state .ei { font-size:44px; margin-bottom:10px; }
.loading { text-align:center; padding:32px; color:var(--muted); font-size:13.5px; }

@media(max-width:700px) {
  .stats-grid { grid-template-columns:repeat(2,1fr); }
  .delivery-grid { grid-template-columns:1fr; }
  .main { padding:12px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">🚚</div>
    <div class="header-title">
      <h1>Theo Dõi Giao Hàng</h1>
      <p>Cập nhật trạng thái giao hàng thực tế</p>
    </div>
    <div class="header-actions">
      <button class="btn-h" onclick="loadOrders()">🔄 Làm mới</button>
      <button class="btn-h" onclick="window.location='dashboard.html'">📋 Dashboard</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tabs-inner">
      <div class="tab" onclick="window.location='index.html'">✏️ Nhập đơn</div>
      <div class="tab" onclick="window.location='dashboard.html'">📋 Danh sách</div>
      <div class="tab" onclick="window.location='sanxuat.html'">🏭 Sản xuất</div>
      <div class="tab active">🚚 Giao hàng</div>
      <div class="tab" onclick="window.location='baocao.html'">📊 Báo cáo</div>
    </div>
  </div>
</div>

<div class="main">

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-icon si-orange">📦</div>
      <div><div class="stat-num" id="sReady">—</div><div class="stat-label">Chờ xuất kho</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon si-purple">🚚</div>
      <div><div class="stat-num" id="sShipped">—</div><div class="stat-label">Đang giao</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon si-green">✅</div>
      <div><div class="stat-num" id="sDone">—</div><div class="stat-label">Đã giao hôm nay</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon si-red">⚠️</div>
      <div><div class="stat-num" id="sLate">—</div><div class="stat-label">Có thể trễ</div></div>
    </div>
  </div>

  <!-- FILTER -->
  <div class="filter-bar">
    <span class="flabel">Lọc:</span>
    <input type="text" id="fSearch" placeholder="🔍 Tìm khách hàng..." oninput="applyFilter()">
    <select id="fStatus" onchange="applyFilter()">
      <option value="">Tất cả trạng thái</option>
      <option value="done">Chờ xuất kho (SX xong)</option>
      <option value="shipped">Đang giao</option>
      <option value="delivered">Đã giao</option>
    </select>
    <input type="date" id="fDate" onchange="applyFilter()" title="Lọc ngày giao">
    <button class="btn-clear" onclick="clearFilter()">✕ Xóa lọc</button>
  </div>

  <!-- SẴN SÀNG GIAO -->
  <div class="section-title">📦 Chờ xuất kho & Đang giao</div>
  <div class="delivery-grid" id="activeGrid">
    <div class="loading">⏳ Đang tải...</div>
  </div>

  <!-- ĐÃ GIAO -->
  <div class="section-title">✅ Đã giao hàng hôm nay</div>
  <div class="delivered-list" id="deliveredList">
    <div class="loading">Đang tải...</div>
  </div>

</div>

<!-- MODAL XÁC NHẬN GIAO -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">Xác nhận giao hàng</h3>
      <button class="modal-close" onclick="closeModalDirect()">×</button>
    </div>
    <div class="modal-body">
      <div class="info-block" id="modalInfo">—</div>
      <label>Ghi chú giao hàng (tùy chọn)</label>
      <textarea id="deliveryNote" placeholder="VD: Đã giao cho bảo vệ cổng. Ký nhận lúc 06:30. Hàng đủ số lượng..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-modal btn-cancel-modal" onclick="closeModalDirect()">Hủy</button>
      <button class="btn-modal btn-confirm-modal" id="confirmBtn" onclick="confirmAction()">✅ Xác nhận</button>
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://qypxbomomhrfskfwjhid.supabase.co';
const SB_KEY = 'sb_publishable__-gEe6Tl9zX6Detpskn31A_r_8hnm7J';
const { createClient } = supabase;
const db = createClient(SB_URL, SB_KEY);

let allOrders = [];
let pendingAction = null;

const CH_MAP = { go:'GO!', winmart:'WinMart', lotte:'Lotte', aeon:'AEON', mega:'Mega', nhole:'Nhỏ lẻ' };

function getToday() { return new Date().toISOString().split('T')[0]; }

function isLate(o) {
  if (!o.delivery_date) return false;
  const now = new Date();
  const delivery = new Date(o.delivery_date + (o.delivery_time ? 'T'+o.delivery_time : 'T23:59'));
  return now > delivery && o.status !== 'delivered';
}

async function loadOrders() {
  try {
    const { data, error } = await db
      .from('hauorder_orders')
      .select('*')
      .in('status', ['done','shipped','delivered'])
      .order('delivery_date', { ascending: true })
      .order('delivery_time', { ascending: true });
    if (error) throw error;
    allOrders = data || [];
    renderStats();
    applyFilter();
  } catch(e) {
    document.getElementById('activeGrid').innerHTML =
      `<div style="color:var(--danger);padding:20px">❌ Lỗi: ${e.message}</div>`;
  }
}

function renderStats() {
  const today = getToday();
  document.getElementById('sReady').textContent = allOrders.filter(o => o.status === 'done').length;
  document.getElementById('sShipped').textContent = allOrders.filter(o => o.status === 'shipped').length;
  document.getElementById('sDone').textContent = allOrders.filter(o => o.status === 'delivered' && o.delivery_date === today).length;
  document.getElementById('sLate').textContent = allOrders.filter(o => isLate(o)).length;
}

function applyFilter() {
  const search = document.getElementById('fSearch').value.toLowerCase();
  const status = document.getElementById('fStatus').value;
  const date = document.getElementById('fDate').value;

  let filtered = allOrders.filter(o => {
    if (search && !o.customer?.toLowerCase().includes(search)) return false;
    if (status && o.status !== status) return false;
    if (date && o.delivery_date !== date) return false;
    return true;
  });

  const active = filtered.filter(o => o.status === 'done' || o.status === 'shipped');
  const delivered = filtered.filter(o => o.status === 'delivered');

  renderActiveGrid(active);
  renderDeliveredList(delivered);
}

function clearFilter() {
  document.getElementById('fSearch').value = '';
  document.getElementById('fStatus').value = '';
  document.getElementById('fDate').value = '';
  applyFilter();
}

function renderActiveGrid(orders) {
  const grid = document.getElementById('activeGrid');
  if (orders.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="ei">🎉</div><p>Không còn đơn nào chờ giao!</p></div>`;
    return;
  }
  grid.innerHTML = orders.map(o => {
    let products = [];
    try { products = JSON.parse(o.products || '[]'); } catch(e) {}
    const prodSummary = products.map(p => `${p.qty} ${p.unit} ${p.name.substring(0,22)}`).join(' · ');
    const late = isLate(o);
    const isShipped = o.status === 'shipped';
    const ch = CH_MAP[o.channel] || o.channel || '';

    return `<div class="delivery-card ${late ? 'late' : ''}">
      <div class="dc-top">
        <div class="dc-customer">${o.customer}</div>
        <div class="dc-meta">
          <span class="dc-po">#${o.id} ${o.po_number ? '· '+o.po_number : ''}</span>
          <span class="dc-ch">${ch}</span>
          ${late ? '<span class="dc-late-badge">⚠️ Có thể trễ</span>' : ''}
        </div>
      </div>
      <div class="dc-body">
        <div class="dc-info-row">
          <span class="dc-icon">📅</span>
          <div class="dc-val"><strong>${o.delivery_date || '—'}</strong> ${o.delivery_time ? '⏰ '+o.delivery_time : ''}</div>
        </div>
        <div class="dc-info-row">
          <span class="dc-icon">📍</span>
          <div class="dc-val">${o.delivery_address || '—'}</div>
        </div>
        <div class="dc-info-row">
          <span class="dc-icon">📦</span>
          <div class="dc-val dc-products">${prodSummary}</div>
        </div>
        ${o.notes ? `<div class="dc-info-row"><span class="dc-icon">📝</span><div class="dc-val" style="font-size:12px;color:var(--muted)">${o.notes}</div></div>` : ''}
      </div>
      <div class="dc-footer">
        ${!isShipped ? `<button class="btn-shipped" onclick="openModal(${o.id},'shipped')">🚚 Xuất kho</button>` : '<span style="font-size:12px;font-weight:700;color:#7d3c98">🚚 Đang giao</span>'}
        <button class="btn-delivered" onclick="openModal(${o.id},'delivered')">✅ Đã giao</button>
      </div>
    </div>`;
  }).join('');
}

function renderDeliveredList(orders) {
  const list = document.getElementById('deliveredList');
  if (orders.length === 0) {
    list.innerHTML = `<div style="color:var(--muted);font-size:13px;padding:10px 0">Chưa có đơn nào hoàn thành hôm nay.</div>`;
    return;
  }
  list.innerHTML = orders.map(o => {
    let products = [];
    try { products = JSON.parse(o.products || '[]'); } catch(e) {}
    const summary = products.map(p => `${p.qty} ${p.unit} ${p.name.substring(0,25)}`).join(' + ');
    return `<div class="delivered-item">
      <div class="di-check">✅</div>
      <div class="di-info">
        <div class="di-customer">${o.customer}</div>
        <div class="di-detail">${summary} · ${o.delivery_address?.substring(0,40) || ''}...</div>
        ${o.delivery_note ? `<div class="di-note">"${o.delivery_note}"</div>` : ''}
      </div>
      <div class="di-time">Đã giao ✓</div>
    </div>`;
  }).join('');
}

function openModal(id, action) {
  const o = allOrders.find(x => x.id === id);
  if (!o) return;
  pendingAction = { id, action, order: o };

  let products = [];
  try { products = JSON.parse(o.products || '[]'); } catch(e) {}
  const summary = products.map(p => `${p.qty} ${p.unit} ${p.name}`).join('<br>');

  document.getElementById('modalTitle').textContent =
    action === 'shipped' ? '🚚 Xác nhận xuất kho' : '✅ Xác nhận đã giao hàng';
  document.getElementById('modalInfo').innerHTML =
    `<strong>${o.customer}</strong>
    📅 ${o.delivery_date || '—'} ${o.delivery_time || ''}<br>
    📍 ${o.delivery_address || '—'}<br><br>
    📦 ${summary}`;
  document.getElementById('deliveryNote').value = '';
  document.getElementById('confirmBtn').textContent =
    action === 'shipped' ? '🚚 Xác nhận xuất kho' : '✅ Xác nhận đã giao';
  document.getElementById('modalOverlay').classList.add('open');
}

async function confirmAction() {
  if (!pendingAction) return;
  const { id, action } = pendingAction;
  const note = document.getElementById('deliveryNote').value.trim();
  try {
    const update = { status: action };
    if (action === 'delivered') {
      update.delivery_note = note || null;
      update.delivered_at = new Date().toISOString();
    }
    const { error } = await db.from('hauorder_orders').update(update).eq('id', id);
    if (error) throw error;
    allOrders = allOrders.map(o => o.id === id ? {...o, ...update} : o);
    closeModalDirect();
    renderStats();
    applyFilter();
  } catch(e) {
    alert('❌ Lỗi: ' + e.message);
  }
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  pendingAction = null;
}

loadOrders();
setInterval(loadOrders, 60000);
</script>
</body>
</html>
